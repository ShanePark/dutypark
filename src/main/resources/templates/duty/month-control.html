<div class="month-control flex flex-wrap">
  <div class="month-control-left w-full md:w-1/4">
    <button class="today-button info" v-on:click="today()"><span>Today</span>
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 inline" viewBox="0 0 24 24" fill="currentColor">
        <path fill-rule="evenodd" d="M4.755 10.059a7.5 7.5 0 0 1 12.548-3.364l1.903 1.903h-3.183a.75.75 0 1 0 0 1.5h4.992a.75.75 0 0 0 .75-.75V4.356a.75.75 0 0 0-1.5 0v3.18l-1.9-1.9A9 9 0 0 0 3.306 9.67a.75.75 0 1 0 1.45.388Zm15.408 3.352a.75.75 0 0 0-.919.53 7.5 7.5 0 0 1-12.548 3.364l-1.902-1.903h3.183a.75.75 0 0 0 0-1.5H2.984a.75.75 0 0 0-.75.75v4.992a.75.75 0 0 0 1.5 0v-3.18l1.9 1.9a9 9 0 0 0 15.059-4.035.75.75 0 0 0-.53-.918Z" clip-rule="evenodd" />
      </svg>
    </button>
  </div>
  <div class="w-full md:w-1/2 monthSelector">
    <a class="move cursor-pointer" v-on:click="addMonth(-1)">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 24 24" fill="currentColor">
        <path fill-rule="evenodd" d="M12 2.25c-5.385 0-9.75 4.365-9.75 9.75s4.365 9.75 9.75 9.75 9.75-4.365 9.75-9.75S17.385 2.25 12 2.25Zm-4.28 9.22a.75.75 0 0 0 0 1.06l3 3a.75.75 0 1 0 1.06-1.06l-1.72-1.72h5.69a.75.75 0 0 0 0-1.5h-5.69l1.72-1.72a.75.75 0 0 0-1.06-1.06l-3 3Z" clip-rule="evenodd" />
      </svg>
    </a>
    <button class="year-month-btn px-4 py-2 rounded font-medium transition-colors text-center" data-tw-toggle="dropdown"
            data-tw-auto-close="outside">
      <span class="currentCalendar" v-text="combinedYearMonth"></span>
    </button>

    <div class="dropdown-menu p-3 shadow">
      <div class="justify-between mb-3 monthSelector-header container flex flex-wrap">
        <div class="w-full md:w-1/6">
          <button class="px-4 py-2 rounded font-medium transition-colors today-button" v-on:click="today()">오늘</button>
        </div>
        <div class="w-full md:w-2/3">
          <div class="m-auto" style="width:fit-content">
            <button class="px-6 py-3 text-lg bg-gray-100 text-gray-800 hover:bg-gray-200 rounded font-medium transition-colors" v-on:click="monthSelector.year-=10">&laquo;</button>
            <button class="px-6 py-3 text-lg bg-gray-100 text-gray-800 hover:bg-gray-200 rounded font-medium transition-colors" v-on:click="monthSelector.year--">&lsaquo;</button>
            <span class="font-bold text-4xl cur-year m-3" v-text="monthSelector.year"></span>
            <button class="px-6 py-3 text-lg bg-gray-100 text-gray-800 hover:bg-gray-200 rounded font-medium transition-colors" v-on:click="monthSelector.year++">&rsaquo;</button>
            <button class="px-6 py-3 text-lg bg-gray-100 text-gray-800 hover:bg-gray-200 rounded font-medium transition-colors" v-on:click="monthSelector.year+=10">&raquo;</button>
          </div>
        </div>
        <div class="w-full md:w-1/6 text-right">
          <button class="px-6 py-3 text-lg bg-gray-100 text-gray-800 hover:bg-gray-200 rounded font-medium transition-colors" v-on:click="closeDropdown">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="currentColor">
              <path fill-rule="evenodd" d="M5.47 5.47a.75.75 0 0 1 1.06 0L12 10.94l5.47-5.47a.75.75 0 1 1 1.06 1.06L13.06 12l5.47 5.47a.75.75 0 1 1-1.06 1.06L12 13.06l-5.47 5.47a.75.75 0 0 1-1.06-1.06L10.94 12 5.47 6.53a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd" />
            </svg>
          </button>
        </div>
      </div>
      <div class="container">
        <div class="grid grid-cols-3 gap-2">
          <button
              v-for="(m, index) in Array.from({ length: 12 }, (_, i) => i + 1)"
              :key="index"
              :class="{ 'border border-gray-500 text-gray-500 hover:bg-gray-500 hover:text-white px-4 py-2 rounded font-medium transition-colors month-btn': true, active: year === monthSelector.year && m === month }"
              @click="selectMonth(m)"
          >{{ m }}월</button>
        </div>
      </div>
    </div>
    <a class="move cursor-pointer" v-on:click="addMonth(1)">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 24 24" fill="currentColor">
        <path fill-rule="evenodd" d="M12 2.25c-5.385 0-9.75 4.365-9.75 9.75s4.365 9.75 9.75 9.75 9.75-4.365 9.75-9.75S17.385 2.25 12 2.25Zm4.28 10.28a.75.75 0 0 0 0-1.06l-3-3a.75.75 0 1 0-1.06 1.06l1.72 1.72H8.25a.75.75 0 0 0 0 1.5h5.69l-1.72 1.72a.75.75 0 1 0 1.06 1.06l3-3Z" clip-rule="evenodd" />
      </svg>
    </a>
  </div>
  <div class="month-control-right w-full md:w-1/4 p-0 relative">
    <div class="search-bar flex items-center" v-if="canSearch">
      <form class="search-form" @submit.prevent="search()">
        <div class="flex w-full">
          <div class="relative flex-grow">
            <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" :class="{'with-person-icon': !isMyCalendar}" :placeholder="searchPlaceholder" v-model="searchQuery">
            <svg v-if="!isMyCalendar" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 absolute search-person-icon" viewBox="0 0 24 24" fill="currentColor">
              <path fill-rule="evenodd" d="M7.5 6a4.5 4.5 0 1 1 9 0 4.5 4.5 0 0 1-9 0ZM3.751 20.105a8.25 8.25 0 0 1 16.498 0 .75.75 0 0 1-.437.695A18.683 18.683 0 0 1 12 22.5c-2.786 0-5.433-.608-7.812-1.7a.75.75 0 0 1-.437-.695Z" clip-rule="evenodd" />
            </svg>
          </div>
          <button class="border border-gray-800 text-gray-800 hover:bg-gray-800 hover:text-white px-4 py-2 rounded font-medium transition-colors" type="submit">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="currentColor">
              <path fill-rule="evenodd" d="M10.5 3.75a6.75 6.75 0 1 0 0 13.5 6.75 6.75 0 0 0 0-13.5ZM2.25 10.5a8.25 8.25 0 1 1 14.59 5.28l4.69 4.69a.75.75 0 1 1-1.06 1.06l-4.69-4.69A8.25 8.25 0 0 1 2.25 10.5Z" clip-rule="evenodd" />
            </svg>
          </button>
        </div>
      </form>
    </div>
    <div class="info member-info absolute right-0" v-if="!canSearch">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 inline" viewBox="0 0 24 24" fill="currentColor">
        <path fill-rule="evenodd" d="M7.5 6a4.5 4.5 0 1 1 9 0 4.5 4.5 0 0 1-9 0ZM3.751 20.105a8.25 8.25 0 0 1 16.498 0 .75.75 0 0 1-.437.695A18.683 18.683 0 0 1 12 22.5c-2.786 0-5.433-.608-7.812-1.7a.75.75 0 0 1-.437-.695Z" clip-rule="evenodd" />
      </svg>
      <span th:text="${member.name}"></span>
    </div>
  </div>
</div>
