<div class="fixed inset-0 z-50 hidden overflow-y-auto bg-black/50" data-tw-modal id="show-other-duties-modal" tabindex="-1" aria-hidden="true">
  <div class="flex min-h-screen items-center relative mx-auto my-8 max-w-4xl">
    <div class="relative bg-white rounded-lg shadow-xl w-full border-0">
      <div class="flex items-center justify-between p-4 border-b bg-blue-500 text-white rounded-t-lg">
        <h5 class="text-xl font-bold" id="addModalLabel">함께 보기</h5>
        <button type="button" class="text-white hover:text-gray-200" data-tw-dismiss="modal" aria-label="Close">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <div class="p-4 py-3">
        <p class="mb-4 text-gray-600 text-xl">
          시간표를 함께 띄울 친구들을 <strong class="text-gray-800">최대 <span v-text="MAX_OTHER_DUTIES"></span>명</strong> 선택하세요.
        </p>
        <div class="flex flex-wrap gap-3 text-2xl">
          <label class="w-full md:w-1/2 p-1 friend-selector" v-for="friend in friends" :key="friend.id" v-if="friend.teamId">
            <div class="card h-full border shadow-sm rounded-lg friend-card">
              <div class="card-body flex items-center gap-3">
                <input type="checkbox" class="h-4 w-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500 mt-0" :id="'friend-' + friend.id"
                       :disabled="otherDutiesSelected.length == MAX_OTHER_DUTIES && !otherDutiesSelected.includes(friend.id)"
                       @change="toggleFriendDuty(friend.id, $event)"/>
                <label :for="'friend-' + friend.id" class="ml-2 text-sm text-gray-700 font-semibold ml-2 mb-0">
                  {{ friend.name }} <small class="text-gray-500">({{ friend.team }})</small>
                </label>
              </div>
            </div>
          </label>
        </div>
      </div>

      <div class="flex items-center justify-end p-4 border-t gap-2 bg-gray-100 rounded-b-lg px-4 py-3">
        <button type="button" class="px-4 py-2 rounded font-medium transition-colors bg-gray-500 text-white hover:bg-gray-600" data-tw-dismiss="modal">확인</button>
      </div>
    </div>
  </div>
</div>
