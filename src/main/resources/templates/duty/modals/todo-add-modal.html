<div
    class="fixed inset-0 z-50 hidden overflow-y-auto bg-black/50"
    data-tw-modal
    id="add-todo-modal"
    tabindex="-1"
    aria-hidden="true"
>
  <div class="flex min-h-screen items-center relative mx-auto my-8 max-w-4xl">
    <div class="relative bg-white rounded-lg shadow-xl w-full">
      <div class="flex items-center justify-between p-4 border-b">
        <h5 class="text-xl font-semibold" id="addModalLabel">할일 추가</h5>
        <button type="button" class="text-gray-400 hover:text-gray-600 absolute right-0 mr-3" data-tw-dismiss="modal"
                aria-label="Close">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
      <div class="p-4">
        <label class="block w-full px-3 py-2 border border-gray-300 rounded-md text-2xl mb-2">할일 제목
          <input
              type="text"
              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent todo-title"
              name="title"
              placeholder="할일 제목을 입력하세요."
          />
        </label>
        <label class="block w-full px-3 py-2 border border-gray-300 rounded-md text-2xl">할일 상세(선택 사항)
          <textarea
              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent todo-content"
              name="content"
              rows="4"
              placeholder="해당 할일에 대한 상세 설명을 입력하세요"
          ></textarea>
        </label>
        <div class="mt-3">
          <label class="block text-sm font-medium text-gray-700 mb-1 font-bold">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 inline" viewBox="0 0 24 24" fill="currentColor">
              <path fill-rule="evenodd" d="M18.97 3.659a2.25 2.25 0 00-3.182 0l-10.94 10.94a3.75 3.75 0 105.304 5.303l7.693-7.693a.75.75 0 011.06 1.06l-7.693 7.693a5.25 5.25 0 11-7.424-7.424l10.939-10.94a3.75 3.75 0 115.303 5.304L9.097 18.835l-.008.008-.007.007-.002.002-.003.002A2.25 2.25 0 015.91 15.66l7.81-7.81a.75.75 0 011.061 1.06l-7.81 7.81a.75.75 0 001.054 1.068L18.97 6.84a2.25 2.25 0 000-3.182z" clip-rule="evenodd" />
            </svg>
            첨부파일 (선택 사항)
          </label>
          <div class="attachment-gallery">
            <div class="attachment-tile" v-for="attachment in newTodo.uploadedAttachments" :key="attachment.id">
              <a
                  v-if="todoAddAttachmentDownloadUrl(attachment)"
                  :href="todoAddAttachmentDownloadUrl(attachment)"
                  class="attachment-download attachment-download-start absolute px-2 py-1 rounded text-sm"
                  download
                  title="다운로드">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" viewBox="0 0 24 24" fill="currentColor">
                  <path fill-rule="evenodd" d="M12 2.25a.75.75 0 01.75.75v11.69l3.22-3.22a.75.75 0 111.06 1.06l-4.5 4.5a.75.75 0 01-1.06 0l-4.5-4.5a.75.75 0 111.06-1.06l3.22 3.22V3a.75.75 0 01.75-.75zm-9 13.5a.75.75 0 01.75.75v2.25a1.5 1.5 0 001.5 1.5h13.5a1.5 1.5 0 001.5-1.5V16.5a.75.75 0 011.5 0v2.25a3 3 0 01-3 3H5.25a3 3 0 01-3-3V16.5a.75.75 0 01.75-.75z" clip-rule="evenodd" />
                </svg>
              </a>
              <div
                  class="attachment-thumb"
                  :class="{'attachment-thumbnail-clickable': attachment.isImage}"
                  @click="attachment.isImage && todoAddOpenAttachmentViewer(attachment)">
                <template v-if="attachment.isImage && (attachment.thumbnailUrl || attachment.previewUrl)">
                  <img
                      :src="attachment.thumbnailUrl || attachment.previewUrl"
                      :alt="attachment.name"
                      class="w-full h-full"
                      style="object-fit: cover;">
                  <div
                      class="attachment-hover-overlay absolute top-0 left-0 w-full h-full flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" viewBox="0 0 24 24" fill="currentColor">
                      <path fill-rule="evenodd" d="M10.5 3.75a6.75 6.75 0 100 13.5 6.75 6.75 0 000-13.5zM2.25 10.5a8.25 8.25 0 1114.59 5.28l4.69 4.69a.75.75 0 11-1.06 1.06l-4.69-4.69A8.25 8.25 0 012.25 10.5z" clip-rule="evenodd" />
                    </svg>
                  </div>
                </template>
                <div v-else class="flex items-center justify-center h-full">
                  <i :class="['bi', todoAddAttachmentIconClass(attachment), 'text-gray-500', 'display-4', 'lh-1']"></i>
                </div>
              </div>
              <div class="attachment-meta">
                <div class="attachment-name" :title="attachment.name">{{ attachment.name }}</div>
                <div class="attachment-size">{{ todoAddFormatBytes(attachment.size) }}</div>
                <div class="attachment-progress"
                     v-if="newTodo.attachmentProgress[attachment.id] !== undefined && newTodo.attachmentProgress[attachment.id] < 100">
                  <div class="progress" style="height: 4px;">
                    <div class="progress-bar"
                         :style="{width: newTodo.attachmentProgress[attachment.id] + '%'}"></div>
                  </div>
                </div>
              </div>
              <button type="button" class="attachment-remove px-2 py-1 rounded text-sm bg-red-500 text-white hover:bg-red-600"
                      @click="todoAddRemoveAttachment(attachment.id)">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="currentColor">
                  <path fill-rule="evenodd" d="M5.47 5.47a.75.75 0 011.06 0L12 10.94l5.47-5.47a.75.75 0 111.06 1.06L13.06 12l5.47 5.47a.75.75 0 11-1.06 1.06L12 13.06l-5.47 5.47a.75.75 0 01-1.06-1.06L10.94 12 5.47 6.53a.75.75 0 010-1.06z" clip-rule="evenodd" />
                </svg>
              </button>
            </div>

            <div class="attachment-tile attachment-add-button">
              <input type="file" id="todo-add-attachment-input" multiple hidden>
              <label for="todo-add-attachment-input"
                     class="attachment-thumb flex flex-col items-center justify-center h-full m-0"
                     style="cursor: pointer;">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-gray-500" viewBox="0 0 24 24" fill="currentColor">
                  <path fill-rule="evenodd" d="M12 2.25c-5.385 0-9.75 4.365-9.75 9.75s4.365 9.75 9.75 9.75 9.75-4.365 9.75-9.75S17.385 2.25 12 2.25zM12.75 9a.75.75 0 00-1.5 0v2.25H9a.75.75 0 000 1.5h2.25V15a.75.75 0 001.5 0v-2.25H15a.75.75 0 000-1.5h-2.25V9z" clip-rule="evenodd" />
                </svg>
                <small class="text-gray-500 mt-2" style="font-size: 0.75rem;">드래그 또는 클릭</small>
              </label>
            </div>
          </div>
        </div>
      </div>
      <div class="flex items-center justify-end p-4 border-t gap-2">
        <button type="button" class="px-4 py-2 rounded font-medium transition-colors bg-green-500 text-white hover:bg-green-600" v-on:click="addTodo()">저장</button>
        <button type="button" class="px-4 py-2 rounded font-medium transition-colors bg-gray-500 text-white hover:bg-gray-600" data-tw-dismiss="modal" v-on:click="cancelAddTodo()">취소</button>
      </div>
    </div>
  </div>
</div>
