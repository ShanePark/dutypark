<div id="search-result-modal" class="fixed inset-0 z-50 hidden overflow-y-auto bg-black/50 text-2xl" data-tw-modal tabindex="-1" aria-hidden="true">
  <div class="flex min-h-screen items-center relative mx-auto my-8 max-w-6xl">
    <div class="relative bg-white rounded-lg shadow-xl w-full">
      <div class="flex items-center justify-between p-4 border-b">
        <span class="text-3xl">검색 결과</span>
        <button type="button" data-tw-dismiss="modal" aria-label="Close" class="text-gray-400 hover:text-gray-600">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
      <div class="p-4">
        <table class="table table-striped">
          <colgroup>
            <col style="width: 10%;">
            <col style="width: 65%;">
            <col style="width: 10%;">
            <col style="width: 15%;">
          </colgroup>
          <thead>
          <tr>
            <th scope="col" class="text-center">#</th>
            <th scope="col">내용</th>
            <th scope="col" class="text-center">태그됨</th>
            <th scope="col" class="text-center">날짜</th>
          </tr>
          </thead>
          <tbody>
          <tr class="search-result-row" v-for="(item, index) in searchResults.content" :key="index"
              v-on:click="moveToSearch(item)">
            <th scope="row" class="text-center">{{ index + 1 + (searchResults.pageable.pageNumber *
              searchResults.pageable.pageSize) }}
            </th>
            <td>{{ item.content }}</td>
            <td class="text-center">
              <svg v-if="item.isTagged" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 inline" viewBox="0 0 24 24" fill="currentColor">
                <path fill-rule="evenodd" d="M19.916 4.626a.75.75 0 01.208 1.04l-9 13.5a.75.75 0 01-1.154.114l-6-6a.75.75 0 011.06-1.06l5.353 5.353 8.493-12.739a.75.75 0 011.04-.208z" clip-rule="evenodd" />
              </svg>
            </td>
            <td class="text-center">{{ formattedDateYMD(item.startDateTime) }}</td>
          </tr>
          </tbody>
        </table>
      </div>
      <div class="flex items-center justify-end p-4 border-t gap-2 flex-col">
        <nav class="" v-if="searchResults.totalPages > 1">
          <ul class="pagination justify-center flex flex-wrap">
            <li class="page-item" :class="{ disabled: searchResults.first }">
              <button class="page-link" @click="search(searchResults.pageable.pageNumber - 1)">이전</button>
            </li>
            <li class="page-item" v-if="startPage > 1">
              <button class="page-link" @click="search(0)">1</button>
            </li>
            <li class="page-item disabled" v-if="startPage > 2">
              <span class="page-link">...</span>
            </li>
            <li class="page-item"
                v-for="page in pagesToShow"
                :key="page"
                :class="{ active: page - 1 === searchResults.pageable.pageNumber }">
              <button class="page-link" @click="search(page - 1)">{{ page }}</button>
            </li>
            <li class="page-item disabled" v-if="endPage < searchResults.totalPages - 1">
              <span class="page-link">...</span>
            </li>
            <li class="page-item" v-if="endPage < searchResults.totalPages">
              <button class="page-link" @click="search(searchResults.totalPages - 1)">{{ searchResults.totalPages }}
              </button>
            </li>
            <li class="page-item" :class="{ disabled: searchResults.last }">
              <button class="page-link" @click="search(searchResults.pageable.pageNumber + 1)">다음</button>
            </li>
          </ul>
        </nav>
        <form class="search-form mb-3" @submit.prevent="search()">
          <div class="flex w-full">
            <label>
              <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="검색" v-model="searchQuery">
            </label>
            <button class="px-4 py-2 rounded font-medium transition-colors border border-gray-800 text-gray-800 hover:bg-gray-800 hover:text-white" type="submit">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="currentColor">
                <path fill-rule="evenodd" d="M10.5 3.75a6.75 6.75 0 100 13.5 6.75 6.75 0 000-13.5zM2.25 10.5a8.25 8.25 0 1114.59 5.28l4.69 4.69a.75.75 0 11-1.06 1.06l-4.69-4.69A8.25 8.25 0 012.25 10.5z" clip-rule="evenodd" />
              </svg>
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
