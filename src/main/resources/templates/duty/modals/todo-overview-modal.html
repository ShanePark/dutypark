<div id="todo-overview-modal" class="fixed inset-0 z-50 hidden overflow-y-auto bg-black/50" data-tw-modal tabindex="-1" aria-hidden="true">
  <div class="flex min-h-screen items-center relative mx-auto my-8 max-w-4xl">
    <div class="relative bg-white rounded-lg shadow-xl w-full">
      <div class="flex items-center justify-between p-4 border-b">
        <h5 class="text-xl font-semibold flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="currentColor">
            <path fill-rule="evenodd" d="M7.502 6h7.128A3.375 3.375 0 0118 9.375v9.375a3 3 0 003-3V6.108c0-1.505-1.125-2.811-2.664-2.94a48.972 48.972 0 00-.673-.05A3 3 0 0015 1.5h-1.5a3 3 0 00-2.663 1.618c-.225.015-.45.032-.673.05C8.662 3.295 7.554 4.542 7.502 6zM13.5 3A1.5 1.5 0 0012 4.5h4.5A1.5 1.5 0 0015 3h-1.5z" clip-rule="evenodd" />
            <path fill-rule="evenodd" d="M3 9.375C3 8.339 3.84 7.5 4.875 7.5h9.75c1.036 0 1.875.84 1.875 1.875v11.25c0 1.035-.84 1.875-1.875 1.875h-9.75A1.875 1.875 0 013 20.625V9.375zm9.586 4.594a.75.75 0 00-1.172-.938l-2.476 3.096-.908-.907a.75.75 0 00-1.06 1.06l1.5 1.5a.75.75 0 001.116-.062l3-3.75z" clip-rule="evenodd" />
          </svg>
          <span>Todo List</span>
        </h5>
        <button type="button" class="text-gray-400 hover:text-gray-600" data-tw-dismiss="modal" aria-label="Close">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
      <div class="p-4">
        <div class="flex flex-wrap items-center justify-between mb-3 gap-2">
          <div class="todo-overview-tags flex items-center gap-2">
            <button type="button"
                    class="btn btn-tag btn-tag-active"
                    :class="{ active: todoOverviewFilters.active }"
                    v-on:click="toggleOverviewFilter('active')">
              <span>진행중</span>
              <span class="count-badge">{{ todos.length }}</span>
            </button>
            <button type="button"
                    class="btn btn-tag btn-tag-completed"
                    :class="{ active: todoOverviewFilters.completed }"
                    v-on:click="toggleOverviewFilter('completed')">
              <span>완료</span>
              <span class="count-badge">{{ completedTodos.length }}</span>
            </button>
            <button type="button"
                    class="btn btn-tag btn-tag-total"
                    :class="{ active: todoOverviewFilters.active && todoOverviewFilters.completed }"
                    v-on:click="toggleOverviewFilter('all')">
              <span>전체</span>
              <span class="count-badge">{{ todos.length + completedTodos.length }}</span>
            </button>
          </div>
        </div>
        <div v-if="filteredOverviewTodos.length > 0" class="list-group overflow-auto text-2xl" id="todo-overview-list"
             style="max-height: 60vh;">
          <div class="list-group-item todo-overview-item flex items-start gap-3"
               v-for="todo in filteredOverviewTodos"
               :key="todo.id"
               :data-id="todo.id"
               :class="{
                 'completed': todo.status === 'COMPLETED',
                 'todo-overview-item-active': todo.status === 'ACTIVE',
                 'todo-overview-item-completed': todo.status === 'COMPLETED'
               }">
            <div v-if="todo.status === 'ACTIVE'"
                 class="handle flex items-center justify-center flex-shrink-0">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="currentColor">
                <path fill-rule="evenodd" d="M3 6.75A.75.75 0 013.75 6h16.5a.75.75 0 010 1.5H3.75A.75.75 0 013 6.75zM3 12a.75.75 0 01.75-.75h16.5a.75.75 0 010 1.5H3.75A.75.75 0 013 12zm0 5.25a.75.75 0 01.75-.75h16.5a.75.75 0 010 1.5H3.75a.75.75 0 01-.75-.75z" clip-rule="evenodd" />
              </svg>
            </div>
            <div class="flex flex-wrap items-start gap-3 flex-grow w-full">
              <div class="w-full lg:w-2/3">
                <div class="font-semibold" v-text="todo.title"></div>
                <p class="mb-0 text-gray-500 text-sm todo-overview-content" v-if="todo.content"
                   v-text="todo.content"></p>
              </div>
              <div class="w-full lg:w-1/3">
                <div
                    class="todo-overview-meta flex flex-col items-start lg:items-end gap-2 text-gray-500 text-sm">
                  <div class="flex items-center gap-1 lg:justify-end">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="currentColor">
                      <path d="M21.731 2.269a2.625 2.625 0 00-3.712 0l-1.157 1.157 3.712 3.712 1.157-1.157a2.625 2.625 0 000-3.712zM19.513 8.199l-3.712-3.712-12.15 12.15a5.25 5.25 0 00-1.32 2.214l-.8 2.685a.75.75 0 00.933.933l2.685-.8a5.25 5.25 0 002.214-1.32L19.513 8.2z" />
                    </svg>
                    <span :title="formatFullDateTime(todo.createdDate)">{{ formatSimpleDate(todo.createdDate) }}</span>
                  </div>
                  <div class="flex items-center gap-1 lg:justify-end" v-if="todo.completedDate">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="currentColor">
                      <path fill-rule="evenodd" d="M2.25 12c0-5.385 4.365-9.75 9.75-9.75s9.75 4.365 9.75 9.75-4.365 9.75-9.75 9.75S2.25 17.385 2.25 12zm13.36-1.814a.75.75 0 10-1.22-.872l-3.236 4.53L9.53 12.22a.75.75 0 00-1.06 1.06l2.25 2.25a.75.75 0 001.14-.094l3.75-5.25z" clip-rule="evenodd" />
                    </svg>
                    <span
                        :title="formatFullDateTime(todo.completedDate)">{{ formatSimpleDate(todo.completedDate) }}</span>
                  </div>
                  <div class="flex flex-wrap lg:flex-nowrap gap-2 lg:justify-end">
                    <button type="button" class="px-2 py-1 text-sm rounded font-medium transition-colors border border-green-500 text-green-500 hover:bg-green-500 hover:text-white flex items-center gap-1"
                            v-if="todo.status === 'ACTIVE'"
                            v-on:click="completeTodoFromOverview(todo)">
                      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="currentColor">
                        <path fill-rule="evenodd" d="M19.916 4.626a.75.75 0 01.208 1.04l-9 13.5a.75.75 0 01-1.154.114l-6-6a.75.75 0 011.06-1.06l5.353 5.353 8.493-12.739a.75.75 0 011.04-.208z" clip-rule="evenodd" />
                      </svg>
                      <span>완료</span>
                    </button>
                    <button type="button" class="px-2 py-1 text-sm rounded font-medium transition-colors border border-blue-500 text-blue-500 hover:bg-blue-500 hover:text-white flex items-center gap-1"
                            v-if="todo.status === 'COMPLETED'"
                            v-on:click="reopenTodoFromOverview(todo)">
                      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="currentColor">
                        <path fill-rule="evenodd" d="M4.755 10.059a7.5 7.5 0 0112.548-3.364l1.903 1.903h-3.183a.75.75 0 100 1.5h4.992a.75.75 0 00.75-.75V4.356a.75.75 0 00-1.5 0v3.18l-1.9-1.9A9 9 0 003.306 9.67a.75.75 0 101.45.388zm15.408 3.352a.75.75 0 00-.919.53 7.5 7.5 0 01-12.548 3.364l-1.902-1.903h3.183a.75.75 0 000-1.5H2.984a.75.75 0 00-.75.75v4.992a.75.75 0 001.5 0v-3.18l1.9 1.9a9 9 0 0015.059-4.035.75.75 0 00-.53-.918z" clip-rule="evenodd" />
                      </svg>
                      <span>재오픈</span>
                    </button>
                    <button type="button" class="px-2 py-1 text-sm rounded font-medium transition-colors border border-red-500 text-red-500 hover:bg-red-500 hover:text-white flex items-center gap-1"
                            v-on:click="deleteTodoFromOverview(todo)">
                      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="currentColor">
                        <path fill-rule="evenodd" d="M16.5 4.478v.227a48.816 48.816 0 013.878.512.75.75 0 11-.256 1.478l-.209-.035-1.005 13.07a3 3 0 01-2.991 2.77H8.084a3 3 0 01-2.991-2.77L4.087 6.66l-.209.035a.75.75 0 01-.256-1.478A48.567 48.567 0 017.5 4.705v-.227c0-1.564 1.213-2.9 2.816-2.951a52.662 52.662 0 013.369 0c1.603.051 2.815 1.387 2.815 2.951zm-6.136-1.452a51.196 51.196 0 013.273 0C14.39 3.05 15 3.684 15 4.478v.113a49.488 49.488 0 00-6 0v-.113c0-.794.609-1.428 1.364-1.452zm-.355 5.945a.75.75 0 10-1.5.058l.347 9a.75.75 0 101.499-.058l-.346-9zm5.48.058a.75.75 0 10-1.498-.058l-.347 9a.75.75 0 001.5.058l.345-9z" clip-rule="evenodd" />
                      </svg>
                      <span>삭제</span>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div v-else class="text-center text-gray-500 py-5 border rounded">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mx-auto" viewBox="0 0 24 24" fill="currentColor">
            <path d="M5.566 4.657A4.505 4.505 0 016.75 4.5h10.5c.41 0 .806.055 1.183.157A3 3 0 0015.75 3h-7.5a3 3 0 00-2.684 1.657zM2.25 12a3 3 0 013-3h13.5a3 3 0 013 3v6a3 3 0 01-3 3H5.25a3 3 0 01-3-3v-6zM5.25 7.5c-.41 0-.806.055-1.184.157A3 3 0 016.75 6h10.5a3 3 0 012.683 1.657A4.505 4.505 0 0018.75 7.5H5.25z" />
          </svg>
          <p class="mt-3 mb-0">표시할 할 일이 없습니다.</p>
        </div>
      </div>
      <div class="flex items-center justify-end p-4 border-t gap-2">
        <button type="button" class="px-4 py-2 rounded font-medium transition-colors bg-gray-500 text-white hover:bg-gray-600" data-tw-dismiss="modal">닫기</button>
      </div>
    </div>
  </div>
</div>
