<div class="teams" v-cloak>
  <h2 class="text-2xl font-bold mb-2">Teams</h2>
  <p class="text-gray-500"><span v-if="keyword">[<b>{{keyword}}</b>] 검색 결과 </span>총 {{ totalElements }}개의 팀이 있습니다.</p>
  <table class="w-full border-collapse mt-2">
    <thead>
    <colgroup>
      <col style="width: 5%">
      <col style="width: 15%">
      <col style="width: 10%">
      <col style="width: 70%">
    </colgroup>
    <tr class="bg-gray-100">
      <th scope="col" class="p-2 text-left"></th>
      <th scope="col" class="p-2 text-left">Name</th>
      <th scope="col" class="p-2 text-left">Members</th>
      <th scope="col" class="p-2 text-left">Description</th>
    </tr>
    </thead>
    <tbody>
    <tr class="hover:bg-gray-100 cursor-pointer odd:bg-gray-50"
        v-for="(team, i) in teams"
        @click="manageTeam(team.id)"
    >
      <td class="p-2 text-center">{{page * 10 + i + 1}}</td>
      <td class="p-2">{{ team.name }}</td>
      <td class="p-2">{{ team.memberCount }}</td>
      <td class="p-2">{{ team.description }}</td>
    </tr>
    </tbody>
  </table>

  <div class="flex justify-between items-center mb-3 mt-4">
    <button class="px-4 py-2 bg-blue-500 text-white rounded font-medium transition-colors hover:bg-blue-600" @click="add()">New Team</button>
    <div class="flex w-1/2">
      <input type="text" class="flex-1 px-3 py-2 border border-gray-300 rounded-l-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Search teams..." v-model="keyword" @keyup.enter="load(0)">
      <button class="px-4 py-2 border border-gray-500 text-gray-500 rounded-r-md hover:bg-gray-500 hover:text-white transition-colors" type="button" @click="load(0)">Search</button>
    </div>
  </div>

  <nav>
    <ul class="flex justify-center gap-1">
      <li :class="{ 'opacity-50 cursor-not-allowed': page === 0 }">
        <a class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-100 transition-colors inline-block" href="#" @click.prevent="load(page - 1)" :class="{ 'pointer-events-none': page === 0 }">Previous</a>
      </li>
      <li v-for="p in totalPages" :key="p">
        <a class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-100 transition-colors inline-block" :class="{ 'bg-blue-500 text-white border-blue-500': p - 1 === page }" href="#" @click.prevent="load(p - 1)">{{ p }}</a>
      </li>
      <li :class="{ 'opacity-50 cursor-not-allowed': page === totalPages - 1 }">
        <a class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-100 transition-colors inline-block" href="#" @click.prevent="load(page + 1)" :class="{ 'pointer-events-none': page === totalPages - 1 }">Next</a>
      </li>
    </ul>
  </nav>
</div>

<!-- Modal -->
<form class="add_modal" hidden>
  <div class="mb-4">
    <div class="mb-4">
      <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Name</label>
      <div class="flex justify-between items-center">
        <input type="text" maxlength="20" minlength="2" class="flex-1 px-3 py-2 border border-gray-300 rounded-md mr-2 focus:outline-none focus:ring-2 focus:ring-blue-500" id="name" name="name"
               placeholder="Team name">
        <button type="button" class="px-4 py-2 bg-blue-500 text-white rounded font-medium transition-colors hover:bg-blue-600 checker">Check</button>
      </div>
    </div>
    <div class="mt-2">
      <label for="description" class="block text-sm font-medium text-gray-700 mb-1">Description</label>
      <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" id="description" name="description" placeholder="description"
             maxlength="50">
    </div>
  </div>
</form>

<script>
  $(function () {
    const app = new Vue({
      el: '.teams',
      data: {
        teams: [],
        page: 0,
        size: 10,
        totalPages: 0,
        totalElements: 0,
        keyword: '',
      },
      mounted() {
        this.load(0);
      },
      methods: {
        load: function (pageNum) {
          const params = new URLSearchParams();
          params.append('page', pageNum);
          params.append('size', this.size);
          params.append('keyword', this.keyword);
          $.ajax({
            url: `/admin/api/teams?${params.toString()}`,
            type: 'GET',
            success: function (response) {
              app.teams = response.content;
              app.page = response.pageable.pageNumber;
              app.totalPages = response.totalPages;
              app.totalElements = response.totalElements;
            },
            error: function (error) {
              console.log(error);
            }
          })
        },
        add: function () {
          const modal = $('.add_modal').clone();
          modal.attr('hidden', false);

          Swal.fire({
            title: 'Add Team',
            html: modal,
            cancelButtonText: 'Cancel',
            showCancelButton: true,
            confirmButtonText: 'Add',
            didOpen: () => {
              Swal.getConfirmButton().setAttribute('disabled', true);
              Swal.getPopup().querySelector('input[name="name"]').addEventListener('input', () => {
                Swal.getConfirmButton().setAttribute('disabled', true);
              });
            },
            preConfirm: () => {
              const name = Swal.getPopup().querySelector('input[name="name"]').value
              const description = Swal.getPopup().querySelector('input[name="description"]').value
              if (!name || !description)
                Swal.showValidationMessage(`Please enter name and description`);
              return {name, description}
            },
          }).then((result) => {
            if (result.isConfirmed) {
              const {name, description} = result.value;
              $.ajax({
                url: '/admin/api/teams',
                type: 'POST',
                data: JSON.stringify({name, description}),
                contentType: 'application/json',
                success: function (team) {
                  const teamId = team.id;
                  window.location.href = `/team/manage/${teamId}`;
                },
                error: function (error) {
                  Swal.fire({
                    icon: 'error',
                    title: '등록 실패.',
                    text: error.responseJSON.errors[0].defaultMessage.toString()
                  })
                }
              })
            }
          })
        },
        manageTeam: function (teamId) {
          window.location.href = `/team/manage/${teamId}`;
        }
      }
    });

    $(document).on('click', '.checker', function () {
      const name = this.parentElement.querySelector('input[name="name"]').value;
      $.ajax({
        url: '/admin/api/teams/check',
        type: 'POST',
        data: JSON.stringify({name}),
        contentType: 'application/json',
        success: function (response) {
          Swal.resetValidationMessage();
          if (response !== "OK") {
            Swal.showValidationMessage(response);
            return;
          }
          Swal.getConfirmButton().disabled = false;
        },
        error: function (error) {
          console.log(error);
        }
      })
    });
  })
</script>
