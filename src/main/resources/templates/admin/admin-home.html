<div class="refresh-tokens bg-white rounded-lg shadow" v-cloak>
  <div class="px-4 py-3 text-center bg-gray-500 text-white font-bold rounded-t-lg">
    회원 관리
  </div>
  <div class="p-2">
    <div v-for="member in members">
      <table class="w-full border-collapse">
        <thead>
        <tr>
          <td colspan="5" class="p-3">
            <div class="flex justify-between items-center">
            <span>
              {{ member.name }}
            </span>
              <button class="px-2 py-1 border border-yellow-500 text-yellow-600 rounded text-sm hover:bg-yellow-500 hover:text-white transition-colors" @click="changePassword(member)">Change Password
              </button>
            </div>
          </td>
        </tr>
        <tr class="bg-gray-100">
          <th class="p-2 text-left"></th>
          <th class="p-2 text-left">Last active</th>
          <th class="p-2 text-left">Ip</th>
          <th class="p-2 text-left">Device</th>
          <th class="p-2 text-left">Browser</th>
        </tr>
        </thead>
        <tbody>
        <tr v-for="(token, index) in member.tokens" class="odd:bg-gray-50">
          <td class="p-2">{{ index+1 }}</td>
          <td class="p-2">{{ token.lastUsed | fromNow }}</td>
          <td class="p-2">{{ token.remoteAddr}}</td>
          <td class="p-2">{{ token.userAgent ? token.userAgent.device : '' }}</td>
          <td class="p-2">{{ token.userAgent ? token.userAgent.browser : '' }}</td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  $(function () {
    const app = new Vue({
      el: '.refresh-tokens',
      data: {
        members: []
      },
      async mounted() {
        await this.load();
      }, methods: {
        load: async function () {
          await $.ajax({
            url: '/admin/api/members-all',
            type: 'GET',
            success: function (members) {
              members.forEach(member => {
                member.tokens = [];
                app.members.push(member);
              });
            },
          })

          await $.ajax({
            url: '/admin/api/refresh-tokens',
            type: 'GET',
            success: function (refreshTokens) {
              const map = new Map();
              for (const refreshToken of refreshTokens) {
                if (map.has(refreshToken.memberId)) {
                  map.get(refreshToken.memberId).push(refreshToken);
                } else {
                  map.set(refreshToken.memberId, [refreshToken]);
                }
              }
              map.forEach((value, key) => {
                const member = app.members.find(member => member.id === value[0].memberId);
                member.tokens = value;
              });
              // sort members by last active
              app.members.sort((a, b) => {
                if (a.tokens.length === 0) {
                  return 1;
                } else if (b.tokens.length === 0) {
                  return -1;
                } else {
                  return dayjs(b.tokens[0].lastUsed).diff(dayjs(a.tokens[0].lastUsed));
                }
              });
            },
            error: function (error) {
              console.log(error);
            }
          })
        },
        changePassword: function (member) {
          Swal.fire({
            title: 'Change ' + member.name + '\'s password',
            html: '<input id="swal-input1" class="swal2-input" placeholder="New Password" type="password">' +
              '<input id="swal-input2" class="swal2-input" placeholder="Confirm Password" type="password">',
            focusConfirm: false,
            preConfirm: () => {
              const newPassword = Swal.getPopup().querySelector('#swal-input1').value;
              const confirmPassword = Swal.getPopup().querySelector('#swal-input2').value;
              if (!newPassword || !confirmPassword) {
                Swal.showValidationMessage(`Please enter new password and confirm password`);
                return false;
              } else if (newPassword !== confirmPassword) {
                Swal.showValidationMessage(`Passwords do not match`);
                return false;
              }
              return {
                memberId: member.id,
                newPassword: newPassword,
              }
            }
          }).then((result) => {
            if (!result.isConfirmed) {
              return;
            }
            $.ajax({
              url: '/api/auth/password',
              type: 'PUT',
              data: JSON.stringify(result.value),
              contentType: 'application/json',
              success: function () {
                Swal.fire({
                  icon: 'success',
                  title: 'Password changed successfully',
                  showConfirmButton: false,
                  timer: 1500
                })
              },
              error: function (error) {
                Swal.fire({
                  icon: 'error',
                  title: 'Oops...',
                  text: error.responseJSON.message
                })
              }
            })
          })
        }
      }
    });
  });
</script>
