<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"
        integrity="sha384-l+xbElFSnPZ2rOaPrU//2FF5B4LB8FiX5q4fXYTlfcG4PGpMkE1vcL7kNXI6Cci0"
        crossorigin="anonymous"></script>

<div class="member-vue" v-cloak>
  <div class="bg-white rounded-lg shadow">
    <div class="px-4 py-3 border-b bg-gray-500 rounded-t-lg text-center text-white font-bold">
      내 정보
    </div>
    <div class="p-4">
      <div class="overflow-x-auto">
        <table class="w-full border-collapse border">
          <colgroup>
            <col style="width: 20%;">
            <col style="width: 80%;">
          </colgroup>
          <tbody>
          <tr>
            <th class="border px-4 py-2 bg-gray-50"><label for="name" class="block text-sm font-medium text-gray-700">이름</label></th>
            <td class="border px-4 py-2">
              <input type="text" readonly class="bg-transparent border-none w-full" id="name" th:value="*{member.name}">
            </td>
          </tr>
          <tr>
            <th class="border px-4 py-2 bg-gray-50"><label for="team" class="block text-sm font-medium text-gray-700">소속</label></th>
            <td class="border px-4 py-2">
              <input type="text" readonly class="bg-transparent border-none w-full" id="team"
                     th:value="${member.team} ?: '-'">
            </td>
          </tr>
          <tr th:if="${member.email}">
            <th class="border px-4 py-2 bg-gray-50"><label for="email" class="block text-sm font-medium text-gray-700">이메일</label></th>
            <td class="border px-4 py-2">
              <input type="text" readonly class="bg-transparent border-none w-full" id="email" th:value="${member.email} ?: '-'">
            </td>
          </tr>
          <tr>
            <th class="border px-4 py-2 bg-gray-50">시간표 공개</th>
            <td class="border px-4 py-2">
              <button class="px-4 py-2 border border-gray-800 text-gray-800 hover:bg-gray-800 hover:text-white rounded font-medium transition-colors"
                      v-on:click="privacyPopup()"
                      v-text="'공개대상:' + privacyLabel"
              ></button>
            </td>
          </tr>
          <tr>
            <th class="border px-4 py-2 bg-gray-50">관리 권한 위임</th>
            <td class="border px-4 py-2">
              <div class="flex flex-wrap">
                <label>
                  <select id="add-manager" class="text-2xl m-1 border p-3 bg-gray-100 rounded" v-on:change="assignManager">
                    <option class="text-xl">관리자 추가</option>
                    <option class="text-xl" v-for="member in familyMembers" :value="member.id" v-if="!isManager(member)">
                      {{ member.name }}
                    </option>
                  </select>
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 inline text-gray-500" viewBox="0 0 24 24" fill="currentColor">
                    <path fill-rule="evenodd" d="M2.25 12c0-5.385 4.365-9.75 9.75-9.75s9.75 4.365 9.75 9.75-4.365 9.75-9.75 9.75S2.25 17.385 2.25 12Zm8.706-1.442c1.146-.573 2.437.463 2.126 1.706l-.709 2.836.042-.02a.75.75 0 0 1 .67 1.34l-.04.022c-1.147.573-2.438-.463-2.127-1.706l.71-2.836-.042.02a.75.75 0 1 1-.671-1.34l.041-.022ZM12 9a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Z" clip-rule="evenodd" />
                  </svg>
                  <span class="text-gray-500">가족만 관리자로 추가할 수 있어요</span>
                </label>
                <div v-for="manager in managers" class="items-center flex w-1/3">
                  <button class="px-3 py-2 bg-gray-100 border rounded-lg m-1 hover:bg-gray-200 transition-colors"
                          v-on:click="unAssignManager(manager)">
                    <span v-text="manager.name"></span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 inline" viewBox="0 0 24 24" fill="currentColor">
                      <path fill-rule="evenodd" d="M16.5 4.478v.227a48.816 48.816 0 0 1 3.878.512.75.75 0 1 1-.256 1.478l-.209-.035-1.005 13.07a3 3 0 0 1-2.991 2.77H8.084a3 3 0 0 1-2.991-2.77L4.087 6.66l-.209.035a.75.75 0 0 1-.256-1.478A48.567 48.567 0 0 1 7.5 4.705v-.227c0-1.564 1.213-2.9 2.816-2.951a52.662 52.662 0 0 1 3.369 0c1.603.051 2.815 1.387 2.815 2.951Zm-6.136-1.452a51.196 51.196 0 0 1 3.273 0C14.39 3.05 15 3.684 15 4.478v.113a49.488 49.488 0 0 0-6 0v-.113c0-.794.609-1.428 1.364-1.452Zm-.355 5.945a.75.75 0 1 0-1.5.058l.347 9a.75.75 0 1 0 1.499-.058l-.346-9Zm5.48.058a.75.75 0 1 0-1.498-.058l-.347 9a.75.75 0 0 0 1.5.058l.345-9Z" clip-rule="evenodd" />
                    </svg>
                  </button>
                </div>
              </div>
            </td>
          </tr>
          <tr>
            <td colspan="2" class="border px-4 py-2">
              <div class="overflow-x-auto">
                <table class="w-full border-collapse text-center">
                  <thead class="bg-gray-100">
                  <tr>
                    <th class="border px-4 py-2">접속 시간</th>
                    <th class="border px-4 py-2">IP</th>
                    <th class="border px-4 py-2">기기</th>
                    <th class="border px-4 py-2">브라우저</th>
                    <th class="border px-4 py-2">관리</th>
                  </tr>
                  </thead>
                  <tbody>
                  <tr v-for="(token, index) in tokens" class="hover:bg-gray-100">
                    <td class="border px-4 py-2">{{ token.lastUsed | fromNow }}</td>
                    <td class="border px-4 py-2">{{ token.remoteAddr }}</td>
                    <td class="border px-4 py-2">{{ token.userAgent ? token.userAgent.device : '' }}</td>
                    <td class="border px-4 py-2">{{ token.userAgent ? token.userAgent.browser : '' }}</td>
                    <td class="border px-4 py-2">
                      <button v-if="!token.isCurrentLogin" class="px-2 py-1 text-sm border border-yellow-500 text-yellow-500 hover:bg-yellow-500 hover:text-white rounded font-medium transition-colors"
                              @click="deleteToken(token.id)">접속 종료
                      </button>
                      <button v-else class="px-2 py-1 text-sm border border-green-500 text-green-500 rounded font-medium cursor-not-allowed opacity-75" disabled>현재 접속</button>
                    </td>
                  </tr>
                  </tbody>
                </table>
              </div>
            </td>
          </tr>
          <tr class="sso-logins">
            <td colspan="2" class="border px-4 py-2">
              <div class="flex flex-col gap-2">
                <div class="flex justify-between items-center">
                  <div>
                    <img class="sso-icon mr-2" src="/lib/kakao/kakao.png" alt="kakao-icon">
                    Kakao
                  </div>
                  <button th:if="${member.kakaoId == null}" class="px-2 py-1 text-sm border border-blue-500 text-blue-500 hover:bg-blue-500 hover:text-white rounded font-medium transition-colors" @click="ssoKakao">
                    연동하기
                  </button>
                  <div th:if="${member.kakaoId != null}">
                    <span class="opacity-75">연동중</span>
                  </div>
                </div>
                <div class="flex justify-between items-center hidden">
                  <div>
                    <img class="sso-icon mr-2" src="/lib/naver/naver.png" alt="naver-icon">
                    Naver
                  </div>
                  <button class="px-2 py-1 text-sm border border-blue-500 text-blue-500 hover:bg-blue-500 hover:text-white rounded font-medium transition-colors" @click="ssoNaver">
                    연동하기
                  </button>
                </div>
              </div>
            </td>
          </tr>
          <tr>
            <td colspan="2" class="border px-4 py-2">
              <div class="flex gap-2 items-center justify-between">
                <div class="p-2">
                  <span>회원정보관리</span>
                </div>
                <div>
                  <button th:if="${member.hasPassword}" class="px-2 py-1 text-sm border border-cyan-500 text-cyan-500 hover:bg-cyan-500 hover:text-white rounded font-medium transition-colors" @click="changePassword">
                    비밀번호 변경
                  </button>
                  <button class="px-2 py-1 text-sm border border-red-500 text-red-500 hover:bg-red-500 hover:text-white rounded font-medium transition-colors" @click="deleteAccount">회원 탈퇴</button>
                </div>
              </div>
            </td>
          </tr>
          <tr>
            <td colspan="2" class="border px-4 py-2 gap2">
              <a class="block w-full text-center px-4 py-2 border border-yellow-500 text-yellow-500 hover:bg-yellow-500 hover:text-white rounded font-medium transition-colors" href="/logout">로그아웃</a>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="privacy-config-modal" class="fixed inset-0 z-50 hidden overflow-y-auto bg-black/50" data-tw-modal tabindex="-1" aria-hidden="true">
    <div class="flex min-h-screen items-center relative mx-auto my-8 max-w-lg">
      <div class="relative bg-white rounded-lg shadow-xl w-full">
        <div class="flex items-center justify-between p-4 border-b">
          <h5 class="text-3xl font-bold">시간표 공개 대상 설정</h5>
          <button type="button" class="text-gray-400 hover:text-gray-600" data-tw-dismiss="modal" aria-label="Close">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
        <div class="p-4">
          <p>내 달력을 공개할 범위를 설정하세요.</p>
          <p>선택시 변경사항이 즉시 저장됩니다. </p>
          <div class="privacy-config flex" role="group" aria-label="Privacy setting">
            <button type="button" class="flex-1 px-4 py-2 bg-green-500 text-white hover:bg-green-600 rounded-l font-medium transition-colors" :class="{'selected': calendarVisibility=='PUBLIC'}"
                    data-privacy="PUBLIC" v-on:click="setPrivacy">누구나
            </button>
            <button type="button" class="flex-1 px-4 py-2 bg-yellow-500 text-white hover:bg-yellow-600 font-medium transition-colors" :class="{'selected': calendarVisibility=='FRIENDS'}"
                    data-privacy="FRIENDS" v-on:click="setPrivacy">친구만
            </button>
            <button type="button" class="flex-1 px-4 py-2 bg-red-500 text-white hover:bg-red-600 rounded-r font-medium transition-colors" :class="{'selected': calendarVisibility=='PRIVATE'}"
                    data-privacy="PRIVATE" v-on:click="setPrivacy">비공개
            </button>
          </div>
        </div>
        <div class="flex items-center justify-end p-4 border-t gap-2">
          <button type="button" class="px-4 py-2 bg-gray-500 text-white hover:bg-gray-600 rounded font-medium transition-colors" data-tw-dismiss="modal">닫기</button>
        </div>
      </div>
    </div>
  </div>

</div>


<script>
    document.addEventListener('DOMContentLoaded', function () {
        const testKey = '962c00be36be55bd0c0b55478cc25149';
        const opKey = 'fe206dfae05cfafc94806ad67abbcfc1';
        const curUrl = window.location.href;
        const curKey = curUrl.includes('localhost') ? testKey : opKey;
        Kakao.init(curKey);
        Kakao.isInitialized();

        const memberId = parseInt("[[${member.id}]]");

        const app = new Vue({
            el: '.member-vue',
            data: {
                tokens: [],
                familyMembers: [],
                managers: [],
                calendarVisibility: "[[${member.calendarVisibility}]]",
            }, // end data
            mounted() {
                this.loadRefreshTokens();
                this.loadFamilyMembers();
                this.loadManagers();
            }, // end mounted
            computed: {
                privacyLabel() {
                    return {
                        PUBLIC: '누구나',
                        FRIENDS: '친구만',
                        FAMILY: '가족에게만',
                        PRIVATE: '비공개',
                    }[this.calendarVisibility];
                },
                isManager() {
                    return (member) => {
                        return this.managers.some(manager => manager.id === member.id);
                    }
                }
            }, // end computed
            methods: {
                loadRefreshTokens() {
                    $.ajax({
                        url: '/api/refresh-tokens',
                        type: 'GET',
                        success: function (refreshTokens) {
                            app.tokens = refreshTokens;
                        },
                        error: function (error) {
                            console.log(error);
                        }
                    })
                },
                loadFamilyMembers() {
                    fetch('/api/members/family')
                        .then(response => {
                            if (!response.ok) {
                                throw new Error('가족 목록을 불러오는 데 실패했습니다.');
                            }
                            return response.json();
                        })
                        .then(data => {
                            app.familyMembers = data;
                        })
                        .catch(error => {
                            console.error('Error:', error);
                        });
                },
                loadManagers() {
                    fetch('/api/members/managers')
                        .then(response => {
                            if (!response.ok) {
                                throw new Error('가족 목록을 불러오는 데 실패했습니다.');
                            }
                            return response.json();
                        })
                        .then(data => {
                            app.managers = data;
                        })
                        .catch(error => {
                            console.error('Error:', error);
                        });
                },
                deleteToken(tokenId) {
                    Swal.fire({
                        title: '정말 로그아웃 하시겠습니까?',
                        text: "해당 기기에서 로그아웃 됩니다.",
                        icon: 'warning',
                        showCancelButton: true,
                        confirmButtonColor: '#d33',
                        cancelButtonColor: '#999',
                        confirmButtonText: '로그아웃',
                        cancelButtonText: '취소'
                    }).then((result) => {
                        if (result.isConfirmed) {
                            $.ajax({
                                url: '/api/refresh-tokens/' + tokenId,
                                type: 'DELETE',
                                success: function () {
                                    app.loadRefreshTokens();
                                },
                                error: function (error) {
                                    console.log(error);
                                }
                            })
                        }
                    })
                },
                changePassword() {
                    Swal.fire({
                        title: '비밀번호 변경',
                        html: '<input id="swal-input1" class="swal2-input" placeholder="현재 비밀번호" type="password">' +
                            '<input id="swal-input2" class="swal2-input" placeholder="변경할 비밀번호" type="password">' +
                            '<input id="swal-input3" class="swal2-input" placeholder="변경할 비밀번호 확인" type="password">',
                        focusConfirm: false,
                        showCancelButton: true,
                        confirmButtonText: '변경',
                        cancelButtonText: '취소',
                        preConfirm: () => {
                            const currentPassword = Swal.getPopup().querySelector('#swal-input1').value
                            const newPassword = Swal.getPopup().querySelector('#swal-input2').value
                            const newPasswordConfirm = Swal.getPopup().querySelector('#swal-input3').value
                            if (!currentPassword || !newPassword || !newPasswordConfirm) {
                                Swal.showValidationMessage(`비밀번호를 입력해주세요.`)
                                return false
                            }
                            if (newPassword !== newPasswordConfirm) {
                                Swal.showValidationMessage(`비밀번호가 일치하지 않습니다.`)
                                return false
                            }
                            if (currentPassword === newPassword) {
                                Swal.showValidationMessage(`현재 비밀번호와 동일합니다.`)
                                return false
                            }
                            return {currentPassword: currentPassword, newPassword: newPassword}
                        }
                    }).then((result) => {
                        if (result.isConfirmed) {
                            const memberId = parseInt("[[${member.id}]]");
                            result.value.memberId = memberId;

                            $.ajax({
                                url: '/api/auth/password',
                                type: 'PUT',
                                data: JSON.stringify(result.value),
                                contentType: 'application/json',
                                success: function () {
                                    Swal.fire({
                                        title: '비밀번호가 변경되었습니다. 다시 로그인 해주세요.',
                                        icon: 'success',
                                        confirmButtonText: '확인',
                                    }).then((result) => {
                                        location.href = '/logout';
                                    });
                                },
                                error: function (error) {
                                    Swal.fire({
                                        title: '비밀번호 변경에 실패하였습니다.',
                                        text: error.responseJSON.message,
                                        icon: 'error',
                                        confirmButtonText: '확인',
                                    })
                                }
                            })
                        }
                    })
                },
                deleteAccount() {
                    Swal.fire({
                        title: '회원 탈퇴',
                        text: '회원 탈퇴는 관리자에게 문의해주세요.',
                        icon: 'alert',
                        confirmButtonText: '확인',
                    })
                },
                ssoNaver() {
                    Swal.fire({
                        title: '네이버 연동',
                        text: '네이버 연동은 아직 준비중입니다.',
                        icon: 'info',
                        confirmButtonText: '확인',
                    })
                },
                ssoKakao() {
                    Kakao.Auth.authorize({
                        redirectUri: window.location.origin + '/api/auth/Oauth2ClientCallback/kakao',
                        state: JSON.stringify({
                                login: true,
                                referer: window.location.href
                            }
                        ),
                    });
                },
                privacyPopup() {
                    TwModal.show('privacy-config-modal');
                },
                setPrivacy(event) {
                    document.querySelector('.privacy-config .btn.selected').classList.remove('selected');
                    const privacy = event.target.getAttribute('data-privacy');

                    fetch(`/api/members/${memberId}/visibility`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            visibility: privacy
                        })
                    }).then(response => {
                        if (!response.ok) {
                            Swal.fire({
                                icon: 'error',
                                title: '공개 대상 설정 변경에 실패했습니다.',
                                showConfirmButton: false,
                                timer: sweetAlTimer
                            });
                            return;
                        }
                        app.calendarVisibility = privacy;
                    });
                },
                assignManager(event) {
                    const memberId = event.target.value;
                    fetch(`/api/members/manager/${memberId}`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                    }).then(response => {
                        if (!response.ok) {
                            Swal.fire({
                                icon: 'error',
                                title: '관리자 추가에 실패했습니다.',
                                showConfirmButton: false,
                                timer: sweetAlTimer
                            });
                            return;
                        }
                        app.loadManagers();
                    });
                },
                unAssignManager(manager) {
                    Swal.fire({
                        title: '관리자 해제',
                        text: `정말 ${manager.name} 님의 관리자 권한을 해제하시겠습니까?`,
                        icon: 'warning',
                        showCancelButton: true,
                        confirmButtonText: '해제',
                        cancelButtonText: '취소'
                    }).then((result) => {
                        if (!result.isConfirmed) {
                            return;
                        }
                        fetch(`/api/members/manager/${manager.id}`, {
                            method: 'DELETE',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                        }).then(response => {
                            if (!response.ok) {
                                Swal.fire({
                                    icon: 'error',
                                    title: '관리자 해제에 실패했습니다.',
                                    showConfirmButton: false,
                                    timer: sweetAlTimer
                                });
                                return;
                            }
                            app.loadManagers();
                        });
                    });
                }
            }, // end methods
        });
    })
</script>
