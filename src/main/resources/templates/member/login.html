<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"
        integrity="sha384-l+xbElFSnPZ2rOaPrU//2FF5B4LB8FiX5q4fXYTlfcG4PGpMkE1vcL7kNXI6Cci0"
        crossorigin="anonymous"></script>

<div class="login-box shadow rounded p-5">
  <form @submit.prevent="login">
    <h1 class="mb-5 pb-3 border-b border-gray-300">로그인</h1>
    <div class="mb-2">
      <label for="emailInput" class="block text-sm font-medium text-gray-700 mb-1">이메일</label>
      <input id="emailInput" type="email" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="이메일 주소" v-model="email">
      <div class="flex items-center mt-1">
        <input type="checkbox" class="h-4 w-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500" id="remember" v-model="remember">
        <label class="ml-2 text-sm text-gray-700" for="remember">아이디 저장</label>
      </div>
    </div>
    <div class="mb-2">
      <label for="passwordInput" class="block text-sm font-medium text-gray-700 mb-1">비밀번호</label>
      <input type="password" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" id="passwordInput" placeholder="비밀번호"
             maxlength="16" v-model="password">
    </div>
    <div class="mt-3">
      <button type="submit" class="w-full px-4 py-2 bg-blue-500 text-white rounded font-medium transition-colors hover:bg-blue-600 text-center">로그인
      </button>
      <div class="text-center my-3">
        <span class="text-gray-500">또는</span>
      </div>
      <div class="w-full mt-2 kakao-login cursor-pointer" @click="kakaoLogin">
        <img class="w-full" src="/lib/kakao/kakao_login_large_wide.png" alt="kakao-login">
      </div>
    </div>
  </form>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const testKey = '962c00be36be55bd0c0b55478cc25149';
        const opKey = 'fe206dfae05cfafc94806ad67abbcfc1';
        const curUrl = window.location.href;
        const curKey = curUrl.includes('localhost') ? testKey : opKey;
        Kakao.init(curKey);
        Kakao.isInitialized();

        const currentPageRequestParam = new URLSearchParams(window.location.search);
        const referer = currentPageRequestParam.get('referer') || '';

        const app = new Vue({
            el: '.login-box',
            data: {
                email: "[[${rememberMe}]]",
                password: '',
                remember: !!"[[${rememberMe}]]",
            },
            methods: {
                login() {
                    const remember = !!app.remember
                    const email = app.email;
                    const password = app.password;

                    if (!email || !password) {
                        Swal.fire({
                            icon: 'error',
                            title: 'Oops...',
                            text: '아이디 또는 비밀번호를 입력해주세요.'
                        })
                        return;
                    }

                    let data = {
                        email: email,
                        password: password,
                        rememberMe: remember,
                    };

                    fetch('/api/auth/login?referer=' + referer, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(data),
                    }).then(async response => {
                        if (response.ok) {
                            location.href = await response.text();
                        } else if (response.status === 401) {
                            throw new Error('아이디 또는 비밀번호가 일치하지 않습니다.');
                        } else {
                            throw new Error('로그인에 실패했습니다.');
                        }
                    }).catch(error => {
                        Swal.fire({
                            icon: 'error',
                            title: 'Oops...',
                            text: error.message
                        });
                    });
                },
                kakaoLogin() {
                    Kakao.Auth.authorize({
                        redirectUri: window.location.origin + '/api/auth/Oauth2ClientCallback/kakao',
                        state: JSON.stringify({referer: referer}),
                    });
                }
            }
        });

    });

</script>
