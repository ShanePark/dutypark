<div id="app" class="bg-white rounded-lg shadow-sm p-0 my-team">
  <div v-if="!team">
    <div class="px-4 py-3 bg-gray-500 text-white font-bold mb-1 text-lg text-center rounded-t-lg">내 팀</div>
    <div class="flex flex-col justify-center items-center p-5 text-gray-500 font-bold text-center">
      <p class="text-2xl ml-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 inline" viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" d="M4.5 2.25a.75.75 0 000 1.5v16.5h-.75a.75.75 0 000 1.5h16.5a.75.75 0 000-1.5h-.75V3.75a.75.75 0 000-1.5h-15zM9 6a.75.75 0 000 1.5h1.5a.75.75 0 000-1.5H9zm-.75 3.75A.75.75 0 019 9h1.5a.75.75 0 010 1.5H9a.75.75 0 01-.75-.75zM9 12a.75.75 0 000 1.5h1.5a.75.75 0 000-1.5H9zm3.75-5.25A.75.75 0 0113.5 6H15a.75.75 0 010 1.5h-1.5a.75.75 0 01-.75-.75zM13.5 9a.75.75 0 000 1.5H15A.75.75 0 0015 9h-1.5zm-.75 3.75a.75.75 0 01.75-.75H15a.75.75 0 010 1.5h-1.5a.75.75 0 01-.75-.75zM9 19.5v-2.25a.75.75 0 01.75-.75h4.5a.75.75 0 01.75.75v2.25a.75.75 0 01-.75.75h-4.5A.75.75 0 019 19.5z" clip-rule="evenodd"/></svg> 어느 팀에도 속해있지 않습니다.
      </p>
      <p class="text-2xl ml-2">팀 관리자에게 가입을 요청해주세요.</p>
    </div>
  </div>
  <template v-if="team">
    <div class="px-4 py-3 text-center bg-gray-500 text-white font-bold mb-1 text-lg rounded-t-lg" v-text="team.name || '로딩중...'"></div>
    <!--    upper buttons-->
    <div class="flex justify-between items-center mb-3 p-1">
      <button v-on:click="goToToday" class="text-lg px-4 py-2 border border-blue-500 text-blue-500 rounded hover:bg-blue-500 hover:text-white transition-colors mr-2">오늘</button>
      <button v-on:click="addMonth(-1)" class="text-lg px-5 py-2 border border-gray-800 text-gray-800 rounded hover:bg-gray-800 hover:text-white transition-colors">&lt;</button>
      <h2 class="text-lg font-bold mb-0 text-center flex-grow" v-text="year + '년 '+ month +'월'"></h2>
      <button v-on:click="addMonth(1)" class="text-lg px-5 py-2 border border-gray-800 text-gray-800 rounded hover:bg-gray-800 hover:text-white transition-colors">&gt;</button>
      <a :href="'/team/manage/'+team.id" v-if="isTeamManager" class="px-4 py-2 border border-gray-800 text-gray-800 rounded text-lg ml-2 hover:bg-gray-800 hover:text-white transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 inline" viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" d="M11.078 2.25c-.917 0-1.699.663-1.85 1.567L9.05 4.889c-.02.12-.115.26-.297.348a7.493 7.493 0 00-.986.57c-.166.115-.334.126-.45.083L6.3 5.508a1.875 1.875 0 00-2.282.819l-.922 1.597a1.875 1.875 0 00.432 2.385l.84.692c.095.078.17.229.154.43a7.598 7.598 0 000 1.139c.015.2-.059.352-.153.43l-.841.692a1.875 1.875 0 00-.432 2.385l.922 1.597a1.875 1.875 0 002.282.818l1.019-.382c.115-.043.283-.031.45.082.312.214.641.405.985.57.182.088.277.228.297.35l.178 1.071c.151.904.933 1.567 1.85 1.567h1.844c.916 0 1.699-.663 1.85-1.567l.178-1.072c.02-.12.114-.26.297-.349.344-.165.673-.356.985-.57.167-.114.335-.125.45-.082l1.02.382a1.875 1.875 0 002.28-.819l.923-1.597a1.875 1.875 0 00-.432-2.385l-.84-.692c-.095-.078-.17-.229-.154-.43a7.614 7.614 0 000-1.139c-.016-.2.059-.352.153-.43l.84-.692c.708-.582.891-1.59.433-2.385l-.922-1.597a1.875 1.875 0 00-2.282-.818l-1.02.382c-.114.043-.282.031-.449-.083a7.49 7.49 0 00-.985-.57c-.183-.087-.277-.227-.297-.348l-.179-1.072a1.875 1.875 0 00-1.85-1.567h-1.843zM12 15.75a3.75 3.75 0 100-7.5 3.75 3.75 0 000 7.5z" clip-rule="evenodd"/></svg> 팀 관리
      </a>
    </div>

    <!--  Calendar-->
    <div class="grid grid-cols-7 font-bold mx-0 text-lg">
      <div v-for="(day, index) in weekDays"
           class="border border-gray-800 border-2 text-center p-1"
           :class="{ 'text-red-500': index === 0, 'text-blue-500': index === 6 }"
           v-text="day">
      </div>
      <div v-for="(teamDay, index) in teamDays"
           @click="selectDay(teamDay)"
           class="text-sm p-2 border border-gray-800 cursor-pointer hover:bg-gray-100"
           :class="{'today': isToday(teamDay), 'selected': isSelectedDay(teamDay) }"
           :style="{'background-color': myDuty[index]?.dutyColor || ''}"
      >
        <div :class=" {'text-red-500': index%7==0, 'text-blue-500': index%7==6, 'opacity-50': teamDay.month!=month }">
          <div class="font-bold day">{{teamDay.day}}
          </div>
          <div v-for="schedule in teamSchedules[index]" class="text-sm truncate text-gray-500">
            <span v-text="schedule.content"></span>
            <small v-if="schedule.totalDays > 1">({{schedule.daysFromStart}}/{{schedule.totalDays}})</small>
          </div>
        </div>
      </div>
    </div>
    <!-- End Calendar-->

    <!-- Team Schedule -->
    <div class="flex justify-between items-center mt-3 mb-2">
      <div class="text-lg font-bold">
        {{ selDay.year }}년 {{ selDay.month }}월 {{ selDay.day }}일
      </div>
      <button class="px-3 py-1 border border-green-500 text-green-500 rounded text-base hover:bg-green-500 hover:text-white transition-colors" @click="newScheduleForm()" v-if="isTeamManager">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 inline" viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" d="M6.75 2.25A.75.75 0 017.5 3v1.5h9V3A.75.75 0 0118 3v1.5h.75a3 3 0 013 3v11.25a3 3 0 01-3 3H5.25a3 3 0 01-3-3V7.5a3 3 0 013-3H6V3a.75.75 0 01.75-.75zm13.5 9a1.5 1.5 0 00-1.5-1.5H5.25a1.5 1.5 0 00-1.5 1.5v7.5a1.5 1.5 0 001.5 1.5h13.5a1.5 1.5 0 001.5-1.5v-7.5z" clip-rule="evenodd"/></svg> 팀 일정 추가
      </button>
    </div>

    <div class="bg-white rounded-lg shadow p-3 mb-4 text-lg" v-if="teamSchedules[selDay.index]?.length">
      <div v-for="schedule in teamSchedules[selDay.index]" :key="schedule.id" class="border-b border-gray-200 py-3">
        <div class="flex justify-between items-start">
          <div class="flex-grow">
            <div class="font-bold mb-1">
              {{ schedule.content }}
              <small>(by: <strong>{{ schedule.createMember }}</strong>)</small>
            </div>
            <div class="mb-1 text-gray-500" v-if="schedule.description">{{ schedule.description }}</div>
            <div class="text-sm text-gray-500">
            </div>
          </div>
          <div class="ml-3" v-if="isTeamManager">
            <button class="px-2 py-1 border border-blue-500 text-blue-500 rounded text-lg mr-1 hover:bg-blue-500 hover:text-white transition-colors" @click="editSchedule(schedule)">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 inline" viewBox="0 0 24 24" fill="currentColor"><path d="M21.731 2.269a2.625 2.625 0 00-3.712 0l-1.157 1.157 3.712 3.712 1.157-1.157a2.625 2.625 0 000-3.712zM19.513 8.199l-3.712-3.712-8.4 8.4a5.25 5.25 0 00-1.32 2.214l-.8 2.685a.75.75 0 00.933.933l2.685-.8a5.25 5.25 0 002.214-1.32l8.4-8.4z"/><path d="M5.25 5.25a3 3 0 00-3 3v10.5a3 3 0 003 3h10.5a3 3 0 003-3V13.5a.75.75 0 00-1.5 0v5.25a1.5 1.5 0 01-1.5 1.5H5.25a1.5 1.5 0 01-1.5-1.5V8.25a1.5 1.5 0 011.5-1.5h5.25a.75.75 0 000-1.5H5.25z"/></svg> 수정
            </button>
            <button class="px-2 py-1 border border-red-500 text-red-500 rounded text-lg hover:bg-red-500 hover:text-white transition-colors" @click="deleteSchedule(schedule.id)">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 inline" viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" d="M16.5 4.478v.227a48.816 48.816 0 013.878.512.75.75 0 11-.256 1.478l-.209-.035-1.005 13.07a3 3 0 01-2.991 2.77H8.084a3 3 0 01-2.991-2.77L4.087 6.66l-.209.035a.75.75 0 01-.256-1.478A48.567 48.567 0 017.5 4.705v-.227c0-1.564 1.213-2.9 2.816-2.951a52.662 52.662 0 013.369 0c1.603.051 2.815 1.387 2.815 2.951zm-6.136-1.452a51.196 51.196 0 013.273 0C14.39 3.05 15 3.684 15 4.478v.113a49.488 49.488 0 00-6 0v-.113c0-.794.609-1.428 1.364-1.452zm-.355 5.945a.75.75 0 10-1.5.058l.347 9a.75.75 0 101.499-.058l-.346-9zm5.48.058a.75.75 0 10-1.498-.058l-.347 9a.75.75 0 001.5.058l.345-9z" clip-rule="evenodd"/></svg> 삭제
            </button>
          </div>
        </div>
      </div>
    </div>
    <!--    End Team Schedule -->

    <!--  shift-->
    <div class="mt-2 p-3" v-if="shift.length > 0">
      <template v-for="group in shift"
                v-if="group.members.length>0">
        <div
            :class="{'duty-type border rounded p-0 mb-4 overflow-hidden': true, 'border-gray-800 border-2': group.isMyGroup}"
            v-if="group.members.length > 0">
          <div
              class="p-3 flex justify-between items-center"
              :style="{'background-color': group.dutyType.color}">
            <span class="font-bold text-base" v-text="group.dutyType.name"></span>
            <span class="inline-block px-2 py-1 bg-gray-100 text-gray-800 rounded text-base">{{ group.members.length }}</span>
          </div>
          <div class="m-0 flex flex-wrap p-3">
            <div v-for="member in group.members" :key="member.id" class="w-1/4 p-1"
                 @click.prevent="moveTo(member.id)">
              <div
                  class="member-card p-2 border rounded shadow-sm text-center cursor-pointer text-base"
                  :class="{'border-gray-800 border-2': member.id === loginMemberId}"
              >
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 inline mb-2" viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" d="M7.5 6a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM3.751 20.105a8.25 8.25 0 0116.498 0 .75.75 0 01-.437.695A18.683 18.683 0 0112 22.5c-2.786 0-5.433-.608-7.812-1.7a.75.75 0 01-.437-.695z" clip-rule="evenodd"/></svg>
                <span v-text="member.name"></span>
              </div>
            </div>
          </div>
        </div>
      </template>
    </div>
    <!--  End Shift-->
  </template>

  <!-- Schedule Modal -->
  <div class="fixed inset-0 z-50 hidden overflow-y-auto bg-black/50" data-tw-modal id="scheduleModal" tabindex="-1" aria-labelledby="scheduleModalLabel" aria-hidden="true">
    <div class="flex min-h-screen items-center relative mx-auto my-8 max-w-4xl">
      <div class="relative bg-white rounded-lg shadow-xl w-full p-3">
        <div class="flex items-center justify-between p-4 border-b">
          <h5 class="text-lg font-bold" id="scheduleModalLabel">팀 일정 저장</h5>
          <button type="button" class="text-gray-400 hover:text-gray-600" data-tw-dismiss="modal" aria-label="닫기">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
        <div class="p-4">
          <div class="mb-3">
            <label class="block text-sm font-medium text-gray-700 mb-1">제목(필수)</label>
            <input v-model="scheduleForm.content" type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" maxlength="30" required/>
          </div>
          <div class="mb-3">
            <label class="block text-sm font-medium text-gray-700 mb-1">상세(옵션)</label>
            <textarea v-model="scheduleForm.description" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" rows="4" maxlength="4096"></textarea>
          </div>
          <div class="flex flex-wrap gap-4">
            <div class="flex-1">
              <label class="block text-sm font-medium text-gray-700 mb-1">시작일</label>
              <input v-model="scheduleForm.startDate" type="date" class="w-full px-3 py-2 border border-gray-300 rounded-md bg-gray-100" readonly/>
            </div>
            <div class="flex-1">
              <label class="block text-sm font-medium text-gray-700 mb-1">종료일</label>
              <input v-model="scheduleForm.endDate" type="date" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"/>
            </div>
          </div>
        </div>
        <div class="flex items-center justify-end p-4 border-t gap-2">
          <button class="px-4 py-2 bg-blue-500 text-white rounded font-medium transition-colors hover:bg-blue-600 text-lg" @click="saveSchedule">저장</button>
          <button class="px-4 py-2 bg-gray-500 text-white rounded font-medium transition-colors hover:bg-gray-600 text-lg" data-tw-dismiss="modal">닫기</button>
        </div>
      </div>
    </div>
  </div>
  <!-- End Schedule Modal -->
</div>

<script>
    const today = new Date();
    const app = new Vue({
        el: '#app',
        data: {
            loginMemberId: parseInt("[[${loginMember?.id}]]"),
            today: {
                year: today.getFullYear(),
                month: today.getMonth() + 1,
                day: today.getDate()
            },
            selDay: {
                year: today.getFullYear(),
                month: today.getMonth() + 1,
                day: today.getDate(),
                index: -99,
            },
            year: today.getFullYear(),
            month: today.getMonth() + 1,
            day: today.getDate(),
            teamDays: [],
            weekDays: ['일', '월', '화', '수', '목', '금', '토'],
            team: {
                name: ''
            },
            shift: [],
            myDuty: [],
            teamSchedules: [],
            isTeamManager: false,
            scheduleForm: {
                content: '',
                description: '',
                startDate: '',
                endDate: '',
            },
        },
        mounted() {
            this.loadMyTeam();
            this.loadShift();
            this.loadMyDuty();
        },
        computed: {},
        watch: {
            'selDay': function () {
                app.findSelDayIndex();
            }
        },
        methods: {
            loadMyTeam() {
                fetch('/api/teams/my?year=' + this.year + '&month=' + this.month)
                    .then(response => response.json())
                    .then(data => {
                        app.team = data.team;
                        app.teamDays = data.teamDays;
                        app.isTeamManager = data.isTeamManager;
                        app.loadTeamSchedules(app.team.id);
                        app.findSelDayIndex();
                    })
                    .catch(error => {
                        console.error('Error:', error);
                    });
            },
            addMonth(month) {
                const newDate = new Date(app.year, app.month - 1 + month);
                app.year = newDate.getFullYear();
                app.month = newDate.getMonth() + 1;
                app.loadMyTeam();
                app.loadMyDuty();
            },
            isToday(teamDay) {
                return teamDay.year === this.today.year &&
                    teamDay.month === this.today.month &&
                    teamDay.day === this.today.day;
            },
            loadShift() {
                fetch(`/api/teams/shift?year=${this.selDay.year}&month=${this.selDay.month}&day=${this.selDay.day}`)
                    .then(response => response.json())
                    .then(data => {
                        app.shift = data;
                        app.shift.forEach(group => {
                            group.isMyGroup = group.members.some(member => member.id === app.loginMemberId);
                        });
                    })
                    .catch(error => {
                        console.error('Error:', error);
                    });
            },
            selectDay(teamDay) {
                app.selDay = teamDay;
                app.loadShift();
            },
            isSelectedDay(teamDay) {
                return teamDay.year === this.selDay.year &&
                    teamDay.month === this.selDay.month &&
                    teamDay.day === this.selDay.day;
            },
            moveTo(id) {
                location.href = "/duty/" + id;
            },
            goToToday() {
                this.year = this.today.year;
                this.month = this.today.month;
                this.selDay = {...this.today};
                this.loadMyTeam();
                this.loadShift();
            },
            loadMyDuty() {
                fetch(`/api/duty?year=${this.year}&month=${this.month}&memberId=${this.loginMemberId}`)
                    .then(response => response.json())
                    .then(data => {
                        app.myDuty = data;
                    })
                    .catch(error => {
                        console.error('Error:', error);
                    });
            },
            saveSchedule() {
                const form = app.scheduleForm
                if (!isValidContent(form.content)) {
                    return;
                }

                const payload = {
                    teamId: this.team.id,
                    id: form.id,
                    content: form.content,
                    description: form.description,
                    startDateTime: form.startDate + 'T00:00:00',
                    endDateTime: form.endDate + 'T00:00:00',
                };

                fetch('/api/teams/schedules', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(payload),
                }).then(res => {
                    if (!res.ok) throw new Error('일정 저장 실패');
                    return res.json();
                }).then(data => {
                    app.loadTeamSchedules(app.team.id);
                    TwModal.hide('scheduleModal');
                }).catch(err => {
                    console.error(err);
                    alert('일정 저장 실패');
                });
            },
            resetScheduleForm() {
                const selDate = formatDate(app.selDay.year, app.selDay.month, app.selDay.day);
                console.log(selDate);
                app.scheduleForm = {
                    id: null,
                    content: '',
                    description: '',
                    startDate: selDate,
                    endDate: selDate,
                };
            },
            newScheduleForm() {
                app.resetScheduleForm();
                TwModal.show('scheduleModal');
            },
            loadTeamSchedules(teamId) {
                fetch(`/api/teams/schedules?year=${this.selDay.year}&month=${this.selDay.month}&teamId=${teamId}`)
                    .then(response => response.json())
                    .then(data => {
                        app.teamSchedules = data;
                    })
                    .catch(error => {
                        console.error('Error:', error);
                    });
            },
            findSelDayIndex() {
                const index = this.teamDays.findIndex(day => {
                    return day.year === this.selDay.year &&
                        day.month === this.selDay.month &&
                        day.day === this.selDay.day;
                });
                this.selDay.index = index;
            },
            editSchedule(schedule) {
                this.scheduleForm = {
                    id: schedule.id,
                    content: schedule.content,
                    description: schedule.description,
                    startDate: schedule.startDateTime.slice(0, 10),
                    endDate: schedule.endDateTime.slice(0, 10),
                };
                TwModal.show('scheduleModal');
            },
            deleteSchedule(id) {
                Swal.fire({
                    title: '정말 삭제하시겠습니까?',
                    text: "삭제된 일정은 복구할 수 없습니다.",
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#d33',
                    confirmButtonText: '삭제',
                    cancelButtonText: '취소',
                }).then((result) => {
                    if (result.isConfirmed) {
                        fetch(`/api/teams/schedules/${id}`, {
                            method: 'DELETE'
                        }).then(res => {
                            if (!res.ok) throw new Error('삭제 실패');
                            this.loadTeamSchedules(this.team.id);
                        }).catch(err => {
                            console.error(err);
                            alert('삭제 중 오류가 발생했습니다.');
                        });
                    }
                });
            },
        },
    });
</script>
