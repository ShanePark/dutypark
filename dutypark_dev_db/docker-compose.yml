services:
  mysql:
    image: mysql:8.0
    container_name: dutypark-dev-db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ROOT_PASSWORD_HERE
      MYSQL_DATABASE: dutypark
      MYSQL_USER: dutypark
      MYSQL_PASSWORD: PASSWORD_HERE
      MYSQL_INITDB_SKIP_TZINFO: 1
    volumes:
      - ./my.cnf/dev-low-memory.cnf:/etc/mysql/conf.d/dev-low-memory.cnf:ro
      - ./data:/var/lib/mysql     
