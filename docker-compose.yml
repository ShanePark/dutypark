services:
  mysql:
    image: mysql:8.0
    container_name: dutypark-db
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Seoul}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: dutypark
      MYSQL_USER: dutypark
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_INITDB_SKIP_TZINFO: 1
    volumes:
      - ./data/my.cnf:/etc/mysql/my.cnf:ro
      - ./data/db:/var/lib/mysql
    networks:
      - db

  app:
    build: .
    container_name: dutypark-app
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      TZ: ${TZ:-Asia/Seoul}
      DB_URL: jdbc:mysql://mysql:3306/dutypark
      DB_USERNAME: dutypark
      DB_PASSWORD: ${MYSQL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      SLACK_TOKEN: ${SLACK_TOKEN}
      DATA_GO_KR_SERVICE_KEY: ${DATA_GO_KR_SERVICE_KEY}
      KAKAO_REST_API_KEY: ${KAKAO_REST_API_KEY}
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      COOKIE_SSL_ENABLED: ${COOKIE_SSL_ENABLED}
      DOMAIN_NAME: ${DOMAIN_NAME}
    networks:
      - app-network
      - db
      - monitoring
    volumes:
      - ./data/logs:/dutypark/logs
      - ./data/storage:/dutypark/storage

  nginx:
    image: nginx:alpine
    container_name: dutypark-nginx
    restart: unless-stopped
    # ports removed - Caddy handles external traffic
    environment:
      TZ: ${TZ:-Asia/Seoul}
      DOMAIN_NAME: ${DOMAIN_NAME}
    volumes:
      - ./data/${NGINX_CONF_NAME:-nginx.conf}:/tmp/nginx.template:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      # SSL certificate volumes - ensure Let's Encrypt certificates are obtained first
      # Run: sudo certbot certonly --standalone -d ${DOMAIN_NAME} before deploying
      - /etc/letsencrypt/live/${DOMAIN_NAME}:/etc/letsencrypt/live/${DOMAIN_NAME}:ro
      - /etc/letsencrypt/archive/${DOMAIN_NAME}:/etc/letsencrypt/archive/${DOMAIN_NAME}:ro
    command: /bin/sh -c "envsubst '$$DOMAIN_NAME' < /tmp/nginx.template > /etc/nginx/nginx.conf && nginx -g 'daemon off;'"
    depends_on:
      app:
        condition: service_started
    networks:
      - edge
      - app-network

  prometheus:
    image: prom/prometheus
    volumes:
      - ./data/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./data/prometheus/rules:/etc/prometheus/rules:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    restart: unless-stopped
    networks:
      - monitoring

  alertmanager:
    image: prom/alertmanager
    container_name: dutypark-alertmanager
    restart: unless-stopped
    environment:
      SLACK_TOKEN: ${SLACK_TOKEN}
      ALERTMANAGER_SLACK_WEBHOOK_URL: ${ALERTMANAGER_SLACK_WEBHOOK_URL:-}
    volumes:
      - ./data/alertmanager/alertmanager.yml.template:/etc/alertmanager/alertmanager.yml.template:ro
    entrypoint: /bin/sh
    command:
      - -c
      - |
        webhook_url="$${ALERTMANAGER_SLACK_WEBHOOK_URL:-https://hooks.slack.com/services/$${SLACK_TOKEN}}"
        sed "s|__SLACK_WEBHOOK_URL__|$${webhook_url}|g" /etc/alertmanager/alertmanager.yml.template > /tmp/alertmanager.yml
        exec /bin/alertmanager --config.file=/tmp/alertmanager.yml --storage.path=/alertmanager
    networks:
      - monitoring

  node-exporter:
    image: prom/node-exporter
    container_name: dutypark-node-exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro,rslave
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
    networks:
      - monitoring

  grafana:
    image: grafana/grafana
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      GF_SERVER_ROOT_URL: https://dutypark.o-r.kr/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - ./data/grafana:/var/lib/grafana
    restart: unless-stopped
    networks:
      - edge
      - monitoring

networks:
  edge:
    name: dutypark_edge
  app-network:
    name: dutypark_app
  db:
    name: dutypark_db
    internal: true
  monitoring:
    name: dutypark_monitoring
